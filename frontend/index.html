<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
    <header class="text-center">
        <h1 class="h1">Proyecto CRUD Frontend</h1>
    </header>

    <main class="container">
        <section class="mt-5">
            <h2>Formulario</h2>
            <input type="text" id="name" class="form-control mb-2" placeholder="Nombre">
            <input type="email" id="email" class="form-control" placeholder="Correo">
        </section>

        <section class="mt-5">
            <h2>Acciones</h2>
            <button id="btnGet" class="btn btn-primary">GET - Listar</button>
            <button id="btnPost" class="btn btn-success">POST - Crear</button>
        </section>

        <section class="mt-5">
            <h2>Usuarios</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <!-- JS renderiza aquí -->
                </tbody>
            </table>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
